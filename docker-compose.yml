networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

services:
  docker-agent:
    build:
      context: .
      dockerfile: docker-agent.Dockerfile
    environment:
      - BOT_TOOL_API_KEY=${BOT_TOOL_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
    networks:
      - external
      - internal
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: "512M"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_ID=${APP_ID}
      - API_HASH=${API_HASH}
      - BOT_TOKEN=${BOT_TOKEN}
      - DOCKER_AGENT_URL=http://docker-agent:8080
      - BOT_TOOL_API_KEY=${BOT_TOOL_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_MODEL_ID=${AI_MODEL_ID:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
      - SANDBOX_URL=http://sandbox:8080
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
      - LISTEN_ADDR=0.0.0.0:8080
    networks:
      - external
      - internal
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      docker-agent:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
        delay: 5s
      rollback_config:
        parallelism: 1
        order: stop-first

  new-api:
    image: calciumion/new-api:latest
    environment:
      - TZ=Asia/Shanghai
      - SESSION_SECRET=${NEW_API_SESSION_SECRET:-}
      - CRYPTO_SECRET=${NEW_API_CRYPTO_SECRET:-}
      - SQL_DSN=${NEW_API_SQL_DSN:-}
      - REDIS_CONN_STRING=${NEW_API_REDIS_CONN_STRING:-}
      - STREAMING_TIMEOUT=300
    volumes:
      - new_api_data:/data
    ports:
      - "3000:3000"
    networks:
      - external
      - internal
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: "512M"

  sandbox:
    build:
      context: sandbox
    environment:
      - SANDBOX_API_KEY=${SANDBOX_API_KEY:-}
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m
    networks:
      - internal
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: "256M"

volumes:
  dynamic_handlers:
  new_api_data:
